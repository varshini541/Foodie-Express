<!DOCTYPE html>
<html>
<head>
<title>OTP Verification</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff5f5;
    overflow: hidden;
}

/* Emoji background */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    font-size: 40px;
    opacity: 0.08;
}

.background span {
    position: absolute;
}

/* Center card */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    background: white;
    padding: 35px;
    width: 350px;
    text-align: center;
    border-radius: 12px;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
}

/* OTP boxes */
.otp-box {
    display: flex;
    justify-content: space-between;
    margin: 20px 0;
}

.otp-box input {
    width: 55px;
    height: 55px;
    text-align: center;
    font-size: 20px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #ff4b2b;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background-color: #e63e1e;
}

</style>
</head>

<body>

<!-- Emoji Background -->
<div class="background">
    <span style="top:10%; left:15%;">🍕</span>
    <span style="top:25%; left:70%;">🍔</span>
    <span style="top:60%; left:20%;">🍟</span>
    <span style="top:75%; left:80%;">🌮</span>
    <span style="top:40%; left:50%;">🍩</span>
    <span style="top:85%; left:35%;">🍗</span>
</div>

<!-- OTP Card -->
<div class="container">

<h2>Enter OTP</h2>
<p>OTP sent to your mobile</p>

<form action="menu.html">
<div class="otp-box">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
</div>

<button type="submit">Verify</button>
</form>

</div>

</body>
</html>
