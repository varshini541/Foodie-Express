<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Address & Payment</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #ff7a00;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: white;
    width: 420px;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    color: #ff7a00;
    margin-bottom: 20px;
}

label {
    font-weight: bold;
    color: #333;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 18px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

input:focus, select:focus {
    outline: none;
    border-color: #ff7a00;
}

/* Done button style using <a> */

.done-btn {
    display: block;
    text-align: center;
    width: 100%;
    padding: 12px;
    background-color: #ff7a00;
    color: white;
    border-radius: 6px;
    font-size: 16px;
    text-decoration: none;
}

.done-btn:hover {
    background-color: #e66900;
}
</style>
</head>

<body>

<div class="container">
<h2>Shipping Address</h2>

<label>Full Name</label>
<input type="text" required>

<label>Phone Number</label>
<input type="tel" required>

<label>Address</label>
<input type="text" required>

<label>City</label>
<input type="text" required>

<label>Pincode</label>
<input type="number" required>

<h2>Payment Method</h2>

<select required>
<option value="">Select Payment Method</option>
<option>Cash on Delivery</option>
<option>Credit/Debit Card</option>
<option>UPI</option>
<option>Net Banking</option>
</select>

<a href="succ.html" class="done-btn">Done</a>

</div>

</body>
</html>
